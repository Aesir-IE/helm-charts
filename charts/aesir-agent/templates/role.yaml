{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aesir-agent.fullname" . }}
  labels:
    {{- include "aesir-agent.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  {{- if .Values.opamp.k8sApply.enabled }}
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "update"]
  {{- end }}
{{- end }}
