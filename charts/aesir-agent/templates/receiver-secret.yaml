{{- if .Values.receiverAuth.enabled }}
{{- $secretName := printf "%s-receiver" (include "aesir-agent.fullname" .) -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $receiverSecret := .Values.receiverAuth.secret -}}
{{- if not $receiverSecret -}}
  {{- if $existing -}}
    {{- $receiverSecret = index $existing.data "AESIR_RECEIVER_SECRET" | b64dec -}}
  {{- else -}}
    {{- $receiverSecret = randAlphaNum 32 -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aesir-agent.labels" . | nindent 4 }}
type: Opaque
stringData:
  AESIR_RECEIVER_SECRET: {{ $receiverSecret | quote }}
{{- end }}
