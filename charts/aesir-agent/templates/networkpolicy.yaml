{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "aesir-agent.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "aesir-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "aesir-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range .Values.networkPolicy.collectorIngress }}
        - podSelector:
            matchLabels:
              {{- toYaml .matchLabels | nindent 14 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.opamp.port }}
        {{- if .Values.metrics.enabled }}
        - protocol: TCP
          port: {{ .Values.metrics.port }}
        {{- end }}
        {{- if .Values.logs.enabled }}
        - protocol: TCP
          port: {{ .Values.logs.port }}
        {{- end }}
        {{- if .Values.capture.enabled }}
        - protocol: TCP
          port: {{ .Values.capture.port }}
        {{- end }}
{{- end }}
